<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no viewport-fit=cover">
  <title>Virtual Pad</title>

  <link rel="stylesheet" href="global.css">
  <link id="skin-style" rel="stylesheet" href="">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>

  <div id="join-screen">
    <h1>AirInput</h1>
    <input type="text" id="username-input" placeholder="Ingresa tu nombre" autocomplete="off" />
    <button id="join-btn">Unirse</button>
  </div>

  <button id="btn-settings" style="display: none;">⚙️</button>

  <div id="settings-modal">
    <h3>Configuración</h3>
    <label>Gamepad type:</label>
    <div class="layout-selector">
      <button onclick="loadSkin('snes')" class="sel-btn">Classic (SNES)</button>
      <button onclick="loadSkin('xbox')" class="sel-btn">Modern</button>
      <button onclick="loadSkin('n64')" class="sel-btn">Classic (N64)</button>
    </div>
    <button id="close-settings">Close</button>
  </div>

  <div id="gamepad-container" style="display: none;"></div>

  <script src="script.js"></script>
</body>

</html>
